<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATELIER — Boutique Minimaliste</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Work+Sans:wght@300;400;500&display=swap');
        
        :root {
            --color-bg: #fafaf8;
            --color-text: #1a1a1a;
            --color-accent: #2d5a4f;
            --color-border: #e0e0dc;
            --color-card: #ffffff;
            --color-hero-gradient-start: #fafaf8;
            --color-hero-gradient-end: #f0f0ed;
            --color-product-bg: #f5f5f3;
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Work Sans', sans-serif;
        }
        
        [data-theme="pastel"] {
            --color-bg: #fdf8f5;
            --color-text: #5a4a42;
            --color-accent: #d4a5a5;
            --color-border: #f5e6df;
            --color-card: #ffffff;
            --color-hero-gradient-start: #fdf8f5;
            --color-hero-gradient-end: #f9ede7;
            --color-product-bg: #faf3ee;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        /* Navigation Desktop */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 250, 248, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
            animation: slideDown 0.6s ease;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }
        
        [data-theme="pastel"] nav {
            background: rgba(253, 248, 245, 0.95);
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--color-accent);
            transition: width 0.3s ease, background 0.4s ease;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        /* Theme Switcher */
        .theme-switcher {
            position: relative;
            background: none;
            border: 1px solid var(--color-border);
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-switcher:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            transform: rotate(180deg);
        }
        
        .cart-btn {
            position: relative;
            background: none;
            border: 1px solid var(--color-border);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            color: var(--color-text);
        }
        
        .cart-btn:hover {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--color-accent);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background 0.4s ease;
        }
        
        /* Bottom Navigation Mobile/Tablet */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--color-border);
            z-index: 1001;
            padding: 0.8rem 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }
        
        .bottom-nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .bottom-nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--color-text);
            padding: 0.5rem 1rem;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .bottom-nav-btn.active {
            color: var(--color-accent);
        }
        
        .bottom-nav-icon {
            font-size: 1.5rem;
        }
        
        /* Bottom Sheet Menu */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 2000;
            max-height: 70vh;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
        }
        
        .bottom-sheet.active {
            transform: translateY(0);
        }
        
        .bottom-sheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .bottom-sheet-overlay.active {
            display: block;
            opacity: 1;
        }
        
        .bottom-sheet-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.4s ease;
        }
        
        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--color-border);
            border-radius: 2px;
            margin: 0 auto 1rem;
            transition: background 0.4s ease;
        }
        
        .bottom-sheet-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
        }
        
        .close-sheet {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, color 0.4s ease;
        }
        
        .close-sheet:hover {
            transform: rotate(90deg);
        }
        
        .bottom-sheet-content {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(70vh - 100px);
        }
        
        .bottom-sheet-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .bottom-sheet-menu a {
            text-decoration: none;
            color: var(--color-text);
            padding: 1rem;
            font-size: 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bottom-sheet-menu a.active {
            background: var(--color-accent);
            color: white;
        }
        
        .bottom-sheet-menu a:not(.active):hover {
            background: var(--color-bg);
        }
        
        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 6rem 2rem 4rem;
            text-align: center;
            background: linear-gradient(180deg, var(--color-hero-gradient-start) 0%, var(--color-hero-gradient-end) 100%);
            animation: fadeIn 1s ease;
            transition: background 0.4s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .hero p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        
        /* Filters */
        .filters {
            max-width: 1400px;
            margin: 3rem auto 2rem;
            padding: 0 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 1.2s ease;
        }
        
        .filter-btn {
            background: white;
            border: 1px solid var(--color-border);
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            color: var(--color-text);
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-text);
            color: white;
            border-color: var(--color-text);
        }
        
        /* Products Grid */
        .products {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            padding-bottom: 6rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 3rem;
        }
        
        .product-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        
        .product-image {
            width: 100%;
            height: 350px;
            background: var(--color-product-bg);
            overflow: hidden;
            position: relative;
            transition: background 0.4s ease;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }
        
        .product-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(45, 90, 79, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        [data-theme="pastel"] .product-image::before {
            background: linear-gradient(135deg, transparent 0%, rgba(212, 165, 165, 0.08) 100%);
        }
        
        .product-card:hover .product-image::before {
            opacity: 1;
        }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-category {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .product-name {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        
        .product-price {
            font-size: 1.1rem;
            color: var(--color-accent);
            font-weight: 500;
            margin-bottom: 1rem;
            transition: color 0.4s ease;
        }
        
        .add-to-cart {
            width: 100%;
            background: var(--color-text);
            color: white;
            border: none;
            padding: 0.9rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .add-to-cart:hover {
            background: var(--color-accent);
            transform: translateY(-2px);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s ease;
            transition: background-color 0.4s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--color-text);
            z-index: 10;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, color 0.4s ease;
        }
        
        .close-modal:hover {
            transform: rotate(90deg);
        }
        
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 3rem;
        }
        
        .detail-image {
            width: 100%;
            height: 500px;
            background: var(--color-product-bg);
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .detail-info h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }
        
        .detail-info .product-category {
            margin-bottom: 1rem;
        }
        
        .detail-info .product-price {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .detail-info p {
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #666;
        }
        
        /* Cart Panel */
        .cart-panel {
            position: fixed;
            right: -450px;
            top: 0;
            width: 450px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 3000;
            transition: right 0.4s ease, background-color 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        
        .cart-panel.active {
            right: 0;
        }
        
        .cart-header {
            padding: 2rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.4s ease;
        }
        
        .cart-header h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
        }
        
        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text);
            transition: transform 0.3s ease, color 0.4s ease;
        }
        
        .close-cart:hover {
            transform: rotate(90deg);
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }
        
        .cart-item {
            display: flex;
            gap: 1rem;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            animation: fadeIn 0.3s ease;
            transition: border-color 0.4s ease;
        }
        
        .cart-item-image {
            width: 80px;
            height: 80px;
            background: var(--color-product-bg);
            flex-shrink: 0;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        
        .cart-item-price {
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            transition: color 0.4s ease;
        }
        
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .qty-btn {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: var(--color-text);
        }
        
        .qty-btn:hover {
            background: var(--color-text);
            color: white;
        }
        
        .cart-item-qty {
            padding: 0 0.8rem;
            font-weight: 500;
        }
        
        .remove-item {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            margin-left: auto;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }
        
        .remove-item:hover {
            color: #d32f2f;
        }
        
        .cart-footer {
            padding: 2rem;
            border-top: 1px solid var(--color-border);
            background: var(--color-bg);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            font-weight: 500;
        }
        
        .checkout-btn {
            width: 100%;
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 1.2rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .checkout-btn:hover {
            background: var(--color-text);
            transform: translateY(-2px);
        }
        
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            color: #999;
        }
        
        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            top: 100px;
            right: 2rem;
            background: var(--color-accent);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.4s ease, background 0.4s ease;
            z-index: 4000;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .nav-links a:not(.cart-btn) {
                display: none;
            }
            
            .bottom-nav {
                display: block;
            }
            
            .products {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 2rem;
            }
            
            .hero {
                padding: 4rem 2rem 3rem;
            }
            
            .hero h1 {
                font-size: 3rem;
            }
            
            .filters {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .logo {
                font-size: 1.5rem;
            }
            
            .product-detail {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
            
            .detail-image {
                height: 300px;
            }
            
            .detail-info h2 {
                font-size: 2rem;
            }
            
            .cart-panel {
                width: 100%;
                right: -100%;
            }
            
            .products {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
                padding: 1.5rem;
            }
            
            .product-image {
                height: 250px;
            }
            
            .notification {
                right: 1rem;
                left: 1rem;
                top: 90px;
            }
        }
        
        @media (max-width: 480px) {
            .products {
                grid-template-columns: 1fr;
            }
            
            .nav-container {
                padding: 1rem;
            }
            
            .hero {
                padding: 3rem 1.5rem 2rem;
                margin-top: 70px;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .bottom-nav-btn {
                font-size: 0.7rem;
                padding: 0.5rem;
            }
            
            .bottom-nav-icon {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body data-theme="default">
    <!-- Navigation Desktop -->
    <nav>
        <div class="nav-container">
            <div class="logo">DG-BOUTIQUE</div>
            <div class="nav-links">
                <a href="#" data-filter="all">Tous</a>
                <a href="#" data-filter="Décoration">Décoration</a>
                <a href="#" data-filter="Mobilier">Mobilier</a>
                <a href="#" data-filter="Accessoires">Accessoires</a>
                <button class="theme-switcher" onclick="toggleTheme()" title="Changer de thème">
                    🎨
                </button>
                <button class="cart-btn" onclick="toggleCart()">
                    Panier
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Navigation Mobile/Tablet -->
    <div class="bottom-nav">
        <div class="bottom-nav-container">
            <button class="bottom-nav-btn active" data-filter="all">
                <span class="bottom-nav-icon">🏠</span>
                <span>Accueil</span>
            </button>
            <button class="bottom-nav-btn" onclick="toggleBottomSheet()">
                <span class="bottom-nav-icon">☰</span>
                <span>Catégories</span>
            </button>
            <button class="bottom-nav-btn" onclick="toggleTheme()">
                <span class="bottom-nav-icon">🎨</span>
                <span>Thème</span>
            </button>
            <button class="bottom-nav-btn" onclick="toggleCart()">
                <span class="bottom-nav-icon">🛒</span>
                <span>Panier</span>
                <span class="cart-count" id="cartCountMobile">0</span>
            </button>
        </div>
    </div>

    <!-- Bottom Sheet Menu -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay" onclick="toggleBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-content">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-header">
                <h3 class="bottom-sheet-title">Catégories</h3>
                <button class="close-sheet" onclick="toggleBottomSheet()">×</button>
            </div>
            <div class="bottom-sheet-menu">
                <a href="#" class="active" data-filter="all" onclick="filterFromSheet('all')">
                    <span>Tous les produits</span>
                    <span>→</span>
                </a>
                <a href="#" data-filter="Décoration" onclick="filterFromSheet('Décoration')">
                    <span>Décoration</span>
                    <span>→</span>
                </a>
                <a href="#" data-filter="Mobilier" onclick="filterFromSheet('Mobilier')">
                    <span>Mobilier</span>
                    <span>→</span>
                </a>
                <a href="#" data-filter="Accessoires" onclick="filterFromSheet('Accessoires')">
                    <span>Accessoires</span>
                    <span>→</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <h1>Collection Minimaliste</h1>
        <p>Découvrez notre sélection d'objets de design contemporain, créés avec soin pour sublimer votre intérieur.</p>
    </section>

    <!-- Filters Desktop -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">Tous les produits</button>
        <button class="filter-btn" data-filter="Décoration">Décoration</button>
        <button class="filter-btn" data-filter="Mobilier">Mobilier</button>
        <button class="filter-btn" data-filter="Accessoires">Accessoires</button>
    </div>

    <!-- Products Grid -->
    <div class="products" id="productsGrid"></div>

    <!-- Product Detail Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div class="product-detail" id="productDetail"></div>
        </div>
    </div>

    <!-- Cart Panel -->
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h2>Votre Panier</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">0,00 €</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Commander</button>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        // Base de données JSON des produits
        const products = [
            {
                id: 1,
                name: "Vase Céramique Noir",
                category: "Décoration",
                price: 89.00,
                image: "https://images.pexels.com/photos/8251395/pexels-photo-8251395.jpeg",
                description: "Vase en céramique artisanale, façonné à la main. Finition mate noir profond, parfait pour vos compositions florales minimalistes."
            },
            {
                id: 2,
                name: "Lampe Arc Moderne",
                category: "Décoration",
                price: 245.00,
                image: "https://images.pexels.com/photos/112811/pexels-photo-112811.jpeg?auto=compress&cs=tinysrgb&w=600",
                description: "Lampe sur pied au design architectural. Structure en métal brossé avec abat-jour en lin naturel. Éclairage d'ambiance chaleureux."
            },
            {
                id: 3,
                name: "Chaise Scandinave",
                category: "Mobilier",
                price: 320.00,
                image: "https://images.pexels.com/photos/29917912/pexels-photo-29917912.jpeg",
                description: "Chaise au design scandinave épuré. Bois de chêne massif et assise rembourrée en tissu bouclette. Confort et élégance assurés."
            },
            {
                id: 4,
                name: "Table Basse Marbre",
                category: "Mobilier",
                price: 580.00,
                image: "https://images.pexels.com/photos/5942736/pexels-photo-5942736.jpeg?auto=compress&cs=tinysrgb&w=600",
                description: "Table basse en marbre blanc de Carrare et piètement en acier noir mat. Une pièce maîtresse pour votre salon."
            },
            {
                id: 5,
                name: "Coussin Lin Naturel",
                category: "Accessoires",
                price: 45.00,
                image: "https://images.pexels.com/photos/16805372/pexels-photo-16805372.jpeg",
                description: "Coussin en lin lavé naturel, garnissage en plumes d'oie. Douceur et confort pour votre canapé ou votre lit."
            },
            {
                id: 6,
                name: "Miroir Rond Laiton",
                category: "Décoration",
                price: 165.00,
                image: "https://images.pexels.com/photos/19079409/pexels-photo-19079409.jpeg?auto=compress&cs=tinysrgb&w=600",
                description: "Miroir circulaire avec cadre en laiton brossé. Design intemporel qui apporte lumière et profondeur à votre espace."
            },
            {
                id: 7,
                name: "Bibliothèque Murale",
                category: "Mobilier",
                price: 425.00,
                image: "https://images.pexels.com/photos/5781044/pexels-photo-5781044.jpeg",
                description: "Étagère murale modulaire en bois de noyer. Design minimaliste et fonctionnel pour exposer vos objets favoris."
            },
            {
                id: 8,
                name: "Plaid Mérinos",
                category: "Accessoires",
                price: 135.00,
                image: "https://images.pexels.com/photos/27515139/pexels-photo-27515139.jpeg",
                description: "Plaid en pure laine mérinos, tissé selon des techniques traditionnelles. Chaleur et douceur incomparables."
            },
            {
                id: 9,
                name: "Bougeoir Marbre",
                category: "Accessoires",
                price: 68.00,
                image: "https://images.pexels.com/photos/5858233/pexels-photo-5858233.jpeg",
                description: "Bougeoir sculptural en marbre noir veiné. Crée une ambiance intimiste et sophistiquée dans votre intérieur."
            }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentFilter = 'all';
        let currentTheme = localStorage.getItem('theme') || 'default';

        // Initialisation
        function init() {
            // Appliquer le thème sauvegardé
            document.body.setAttribute('data-theme', currentTheme);
            
            renderProducts();
            updateCartUI();
            setupFilters();
        }

        // Theme Switcher
        function toggleTheme() {
            currentTheme = currentTheme === 'default' ? 'pastel' : 'default';
            document.body.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            
            const themeName = currentTheme === 'pastel' ? 'Pastel Poudré' : 'Minimaliste';
            showNotification(`Thème ${themeName} activé 🎨`);
        }

        // Afficher les produits
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentFilter === 'all' 
                ? products 
                : products.filter(p => p.category === currentFilter);
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" onclick="showProductDetail(${product.id})">
                    <div class="product-image"><img src="${product.image}" alt="${product.name}" loading="lazy"></div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">${product.price.toFixed(2).replace('.', ',')} €</div>
                        <button class="add-to-cart" onclick="addToCart(event, ${product.id})">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filtres
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn, .nav-links a');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const filter = btn.dataset.filter;
                    if (filter) {
                        currentFilter = filter;
                        document.querySelectorAll('.filter-btn, .nav-links a').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderProducts();
                    }
                });
            });

            // Bottom navigation filters
            const bottomNavBtns = document.querySelectorAll('.bottom-nav-btn[data-filter]');
            bottomNavBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const filter = btn.dataset.filter;
                    if (filter) {
                        currentFilter = filter;
                        document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderProducts();
                    }
                });
            });
        }

        // Bottom Sheet
        function toggleBottomSheet() {
            const sheet = document.getElementById('bottomSheet');
            const overlay = document.getElementById('bottomSheetOverlay');
            sheet.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function filterFromSheet(filter) {
            currentFilter = filter;
            
            // Update bottom sheet menu
            document.querySelectorAll('.bottom-sheet-menu a').forEach(a => a.classList.remove('active'));
            document.querySelector(`.bottom-sheet-menu a[data-filter="${filter}"]`).classList.add('active');
            
            // Update bottom nav
            document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
            
            renderProducts();
            toggleBottomSheet();
            
            // Scroll to products
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        // Détail produit
        function showProductDetail(productId) {
            const product = products.find(p => p.id === productId);
            const modal = document.getElementById('productModal');
            const detail = document.getElementById('productDetail');
            
            detail.innerHTML = `
                <div class="detail-image"><img src="${product.image}" alt="${product.name}"></div>
                <div class="detail-info">
                    <div class="product-category">${product.category}</div>
                    <h2>${product.name}</h2>
                    <div class="product-price">${product.price.toFixed(2).replace('.', ',')} €</div>
                    <p>${product.description}</p>
                    <button class="add-to-cart" onclick="addToCart(event, ${product.id})">
                        Ajouter au panier
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // Gestion du panier
        function addToCart(event, productId) {
            event.stopPropagation();
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveCart();
            updateCartUI();
            showNotification(`${product.name} ajouté au panier`);
        }

        function updateQuantity(productId, delta) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    saveCart();
                    updateCartUI();
                }
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartCountMobile = document.getElementById('cartCountMobile');
            const cartTotal = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            cartCount.textContent = totalItems;
            cartCountMobile.textContent = totalItems;
            cartTotal.textContent = totalPrice.toFixed(2).replace('.', ',') + ' €';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Votre panier est vide</p>
                    </div>
                `;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image"><img src="${item.image}" alt="${item.name}" loading="lazy"></div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price.toFixed(2).replace('.', ',')} €</div>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span class="cart-item-qty">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                                <button class="remove-item" onclick="removeFromCart(${item.id})">Retirer</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function toggleCart() {
            document.getElementById('cartPanel').classList.toggle('active');
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('Votre panier est vide');
                return;
            }
            showNotification('Commande simulée avec succès ! 🎉');
            cart = [];
            saveCart();
            updateCartUI();
            setTimeout(() => toggleCart(), 1500);
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Fermer modal en cliquant à l'extérieur
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') {
                closeModal();
            }
        });

        // Initialiser l'application
        init();
    </script>
</body>
</html>
